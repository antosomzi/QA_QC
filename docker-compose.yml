services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      # S3 video storage
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-qa-qc-app}
      - S3_REGION=${S3_REGION:-us-east-2}
      # AWS credentials (leave empty to use IAM instance role on EC2)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${S3_REGION:-us-east-2}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=annotation_app_db
    # DB only accessible from other containers on the Docker network, NOT from the host/internet
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d annotation_app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
